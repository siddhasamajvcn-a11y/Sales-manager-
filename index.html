<!doctype html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales and Stock Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&amp;family=Manjari:wght@400;700&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #f1f8e9;
            --accent-color: #ff5722;
            --sidebar-width: 260px;
            --text-dark: #333;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Manjari', sans-serif; }

        body { background-color: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Design */
        #sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #1b5e20 0%, #2e7d32 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            transition: all 0.3s;
        }

        #sidebar h2 { text-align: center; font-size: 1.2rem; margin-bottom: 30px; padding: 0 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }

        .nav-btn {
            background: none;
            border: none;
            color: var(--white);
            padding: 15px 25px;
            text-align: left;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.1); border-left: 5px solid var(--accent-color); }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }

        header {
            background: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .storage-switch { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }

        /* Sections */
        .section { padding: 30px; display: none; }
        .section.active { display: block; }

        /* Dashboard & Bills */
        .bill-container {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            position: relative;
        }

        .bill-header { display: flex; justify-content: space-between; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--secondary-color); }

        .over-entry { color: red; font-weight: bold; }

        /* Input fields style */
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        }

        /* Auto-suggest list */
        .suggestion-list {
            position: absolute; background: white; border: 1px solid #ddd;
            z-index: 100; max-height: 200px; overflow-y: auto; width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .suggestion-item:hover, .suggestion-item.selected { background-color: #e8f5e9; }

        /* Admin Panel Hidden Section */
        #admin-hidden-trigger {
            position: fixed; bottom: 10px; right: 10px; width: 40px; height: 40px; cursor: pointer; opacity: 0.1;
        }

        /* Calendar Styling */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .calendar-day { 
            padding: 15px; background: white; border: 1px solid #eee; text-align: center; cursor: pointer; border-radius: 5px;
        }
        .calendar-day:hover { background: var(--secondary-color); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-import { background: #0277bd; color: white; }
        
        /* Floating Total */
        .bill-total { text-align: right; font-size: 1.5rem; font-weight: bold; margin-top: 20px; color: var(--primary-color); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>SALES &amp; STOCK</h2>
        <button class="nav-btn active" onclick="showSection('sales')">1. Sales Dashboard</button>
        <button class="nav-btn" onclick="showSection('stock')">2. Stock Management</button>
        <button class="nav-btn" onclick="showSection('tally')">3. Sales to Tally</button>
        <button class="nav-btn" onclick="showSection('daybook')">4. Daybook</button>
        <button class="nav-btn" onclick="showSection('admin')">5. Admin Panel</button>
        <div style="margin-top: auto; padding: 20px;">
            <button class="btn btn-import" onclick="document.getElementById('importStockInput').click()">Import Stock</button>
            <input type="file" id="importStockInput" class="hidden" accept=".csv" onchange="handleFileImport(this, 'stock')">
            <br><br>
            <button class="btn btn-import" onclick="document.getElementById('importPriceInput').click()">Import Price</button>
            <input type="file" id="importPriceInput" class="hidden" accept=".csv" onchange="handleFileImport(this, 'price')">
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1 id="page-title">Sales Dashboard</h1>
            <div class="storage-switch">
                <span>Storage:</span>
                <select id="storageMode" onchange="toggleStorage()">
                    <option value="local">Local Storage</option>
                    <option value="online">Online (GitHub/Cloud)</option>
                </select>
            </div>
        </header>

        <div id="sales" class="section active">
            <div id="bills-list">
                </div>
            <button class="btn btn-save" onclick="addNewBill()">+ New Bill</button>
        </div>

        <div id="stock" class="section">
            <div style="margin-bottom: 10px; display: flex; justify-content: space-between;">
                <h2>Inventory</h2>
                <button class="btn btn-save" onclick="saveStockTable()">Save Changes</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="stockTable">
                    <thead>
                        <tr>
                            <th>Medicine Name</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Main Price</th>
                            <th oncontextmenu="toggleExtraML(); return false;">Price 25ml</th>
                            <th id="extraMLHeader" class="hidden">Extra ml</th>
                            <th>Over Entry</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tally" class="section">
            <h2>Sales to Tally Table</h2>
            <table id="tallyTable">
                <thead>
                    <tr><th>Item Name</th><th>Quantity</th><th>Total Amount</th><th>Actions</th></tr>
                </thead>
                <tbody id="tallyTableBody"></tbody>
            </table>
        </div>

        <div id="daybook" class="section">
            <h2>Daybook</h2>
            <div id="daySummary" style="margin-bottom: 20px; display: flex; gap: 20px;"></div>
            <div id="daybookCalendar" class="calendar"></div>
        </div>

        <div id="admin" class="section">
            <h2>Admin Panel</h2>
            <p>പ്രധാന ലാഭവിവരങ്ങൾ ഇവിടെ കാണാം.</p>
            <div id="profitStats" style="margin-top: 20px;"></div>
            <div id="adminCalendar" class="calendar"></div>
        </div>

        <div id="admin-hidden-trigger" onclick="promptAdminPassword()"></div>
    </div>

    <script>
        // Data Structures
        let stockData = JSON.parse(localStorage.getItem('ayur_stock')) || [];
        let salesData = JSON.parse(localStorage.getItem('ayur_sales')) || [];
        let currentStorage = 'local';
        let adminUnlocked = false;

        // Initialize App
        function init() {
            renderStockTable();
            addNewBill();
            updateDaybook();
        }

        // Section Navigation
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-title').innerText = id.toUpperCase();
            if(id === 'stock') renderStockTable();
            if(id === 'tally') renderTallyTable();
        }

        // Import Functions
        function handleFileImport(input, type) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                processCSV(text, type);
            };
            reader.readAsText(file);
        }

        function processCSV(text, type) {
            const rows = text.split('\n').map(row => row.split(','));
            if (type === 'price') {
                // Simplified price import logic
                rows.slice(1).forEach(cols => {
                    if(cols.length < 2) return;
                    let name = cols[1].trim();
                    let btlPrice = parseFloat(cols[2]) || 0;
                    let mlPrice = parseFloat(cols[3]) || 0;
                    let unit = cols[5]?.trim() || 'btl';
                    
                    let item = stockData.find(i => i.name === name);
                    if(item) {
                        item.price = btlPrice;
                        item.price25ml = mlPrice;
                        item.unit = unit;
                    } else {
                        stockData.push({name, qty: 0, unit, price: btlPrice, price25ml: mlPrice, extraMl: 30, overEntry: 0});
                    }
                });
            } else if (type === 'stock') {
                rows.slice(1).forEach(cols => {
                    if(cols.length < 2) return;
                    let name = cols[0].trim();
                    let qty = parseInt(cols[1]) || 0;
                    let item = stockData.find(i => i.name === name);
                    if(item) item.qty = qty;
                });
            }
            saveData();
            renderStockTable();
            alert("Import Successful!");
        }

        // Calculation Logic
        function calculateRate(item, qtyStr, roundOff) {
            let total = 0;
            let qtyValue = 0;
            roundOff = parseFloat(roundOff) || 0;

            if (item.unit === 'nos') {
                qtyValue = parseFloat(qtyStr.replace(/[^0-9.]/g, '')) || 0;
                total = (qtyValue * item.price) + roundOff;
            } else {
                // BTL / ML logic
                if (qtyStr.toLowerCase().includes('b')) {
                    let parts = qtyStr.toLowerCase().split('b');
                    let btls = parseFloat(parts[0]) || 0;
                    let mls = parts[1] ? (parseFloat(parts[1].replace('m', '')) || 0) : 0;
                    let totalMl = (btls * 450) + mls;
                    total = (totalMl / 25 * item.price25ml) + roundOff;
                } else if (qtyStr.toLowerCase().includes('m')) {
                    qtyValue = parseFloat(qtyStr.replace(/[^0-9.]/g, '')) || 0;
                    total = (qtyValue / 25 * item.price25ml) + roundOff;
                } else {
                    // Default to btl if no unit specified but item is btl unit
                    qtyValue = parseFloat(qtyStr) || 0;
                    total = (qtyValue * item.price) + roundOff;
                }
            }
            return Math.round(total);
        }

        // Sales Dashboard Logic
        let billCounter = 1;
        function addNewBill() {
            const container = document.getElementById('bills-list');
            const billId = `bill-${Date.now()}`;
            const billHtml = `
                <div class="bill-container" id="${billId}">
                    <div class="bill-header">
                        <strong>Bill No: #${billCounter++}</strong>
                        <select onchange="updateBillCategory('${billId}', this.value)">
                            <option value="Unknown">Unknown</option>
                            <option value="Cash entered">Cash Entered</option>
                            <option value="Bank entered">Bank Entered</option>
                            <option value="To bank">To Bank</option>
                            <option value="To cash">To Cash</option>
                        </select>
                        <button onclick="removeBill('${billId}')" style="color:red; background:none; border:none; cursor:pointer;">✖ Delete Bill</button>
                    </div>
                    <table id="table-${billId}">
                        <thead>
                            <tr><th>Item Name</th><th>Quantity</th><th>Round Off</th><th>Total</th><th></th></tr>
                        </thead>
                        <tbody>
                            ${generateBillRow(billId)}
                        </tbody>
                    </table>
                    <div class="bill-total" id="total-${billId}">Total: ₹0</div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', billHtml);
        }

        function generateBillRow(billId) {
            return `
                <tr>
                    <td style="position:relative;">
                        <input type="text" class="search-medicine" placeholder="Type medicine name..." onkeyup="searchMedicine(this, '${billId}')">
                        <div class="suggestion-list hidden"></div>
                    </td>
                    <td><input type="text" class="qty-input" onchange="updateRowTotal(this, '${billId}')"></td>
                    <td><input type="number" class="round-input" value="0" onchange="updateRowTotal(this, '${billId}')"></td>
                    <td class="row-total">0</td>
                    <td><button onclick="deleteRow(this, '${billId}')">✖</button></td>
                </tr>
            `;
        }

        function searchMedicine(input, billId) {
            const term = input.value.toLowerCase();
            const list = input.nextElementSibling;
            if(!term) { list.classList.add('hidden'); return; }

            const filtered = stockData.filter(i => i.name.toLowerCase().includes(term));
            list.innerHTML = '';
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<span>${item.name}</span> <span style="font-size:0.8rem; color:blue;">Stock: ${item.qty}</span>`;
                div.onclick = () => {
                    input.value = item.name;
                    list.classList.add('hidden');
                    input.closest('tr').dataset.itemName = item.name;
                    if(item.overEntry > 0) input.style.color = 'red';
                    else input.style.color = 'black';
                    input.parentElement.parentElement.querySelector('.qty-input').focus();
                };
                list.appendChild(div);
            });
            list.classList.remove('hidden');
        }

        function updateRowTotal(el, billId) {
            const tr = el.closest('tr');
            const itemName = tr.dataset.itemName;
            const item = stockData.find(i => i.name === itemName);
            if(!item) return;

            const qtyStr = tr.querySelector('.qty-input').value;
            const roundOff = tr.querySelector('.round-input').value;
            const totalCell = tr.querySelector('.row-total');

            const rate = calculateRate(item, qtyStr, roundOff);
            totalCell.innerText = rate;

            updateBillTotal(billId);

            // If it's the last row, add a new one
            const tbody = tr.parentElement;
            if(tr === tbody.lastElementChild && qtyStr !== "") {
                tbody.insertAdjacentHTML('beforeend', generateBillRow(billId));
            }
        }

        function updateBillTotal(billId) {
            const rows = document.querySelectorAll(`#table-${billId} .row-total`);
            let total = 0;
            rows.forEach(r => total += parseFloat(r.innerText) || 0);
            document.getElementById(`total-${billId}`).innerText = `Total: ₹${total}`;
            saveData();
        }

        // Profit & Admin Logic
        function promptAdminPassword() {
            const pw = prompt("Enter Password:");
            if(pw === "1234") {
                adminUnlocked = true;
                showSection('admin');
                renderAdminStats();
            } else {
                alert("Incorrect Password!");
            }
        }

        function renderStockTable() {
            const body = document.getElementById('stockTableBody');
            body.innerHTML = '';
            stockData.forEach((item, index) => {
                body.innerHTML += `
                    <tr>
                        <td><input type="text" value="${item.name}" onchange="updateStockItem(${index}, 'name', this.value)"></td>
                        <td><input type="number" value="${item.qty}" onchange="updateStockItem(${index}, 'qty', this.value)"></td>
                        <td><input type="text" value="${item.unit}" onchange="updateStockItem(${index}, 'unit', this.value)"></td>
                        <td><input type="number" value="${item.price}" onchange="updateStockItem(${index}, 'price', this.value)"></td>
                        <td><input type="number" value="${item.price25ml}" onchange="updateStockItem(${index}, 'price25ml', this.value)"></td>
                        <td class="extra-ml-col hidden"><input type="number" value="${item.extraMl}" onchange="updateStockItem(${index}, 'extraMl', this.value)"></td>
                        <td><input type="number" class="${item.overEntry > 0 ? 'over-entry' : ''}" value="${item.overEntry}" onchange="updateStockItem(${index}, 'overEntry', this.value)"></td>
                    </tr>
                `;
            });
        }

        function updateStockItem(index, key, value) {
            stockData[index][key] = key === 'name' || key === 'unit' ? value : parseFloat(value);
        }

        function saveData() {
            localStorage.setItem('ayur_stock', JSON.stringify(stockData));
            localStorage.setItem('ayur_sales', JSON.stringify(salesData));
        }

        function toggleExtraML() {
            const header = document.getElementById('extraMLHeader');
            const cols = document.querySelectorAll('.extra-ml-col');
            header.classList.toggle('hidden');
            cols.forEach(c => c.classList.toggle('hidden'));
        }

        // Initialize on load
        window.onload = init;

    </script>

</body></html>
